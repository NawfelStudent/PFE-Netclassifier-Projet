<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail R\u00e9seau - Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f1923 0%, #1a2332 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: rgba(255,255,255,0.97); padding: 44px;
            border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            width: 400px; max-width: 90vw;
        }
        h1 { color: #1a1a2e; margin-bottom: 6px; font-size: 26px; }
        .subtitle { color: #666; margin-bottom: 28px; font-size: 14px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 600; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px 16px;
            border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 15px; transition: border-color 0.3s, box-shadow 0.3s;
            background: #fafafa;
        }
        input:hover {
            border-color: #1a1a2e;
            box-shadow: 0 0 5px rgba(26, 26, 46, 0.5);
        }
        input:focus { border-color: #0f3460; outline: none; background: #fff; }
        button {
            width: 100%; padding: 14px; margin-top: 8px;
            background: #0f3460; color: white;
            border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600;
            cursor: pointer; transition: background 0.3s;
        }
        button:hover { background: #1a1a2e; }
        .error-msg {
            background: #fff0f0; color: #c00; border: 1px solid #fcc;
            padding: 10px 14px; border-radius: 8px;
            margin-bottom: 18px; font-size: 14px;
        }
        .info {
            color: #999; font-size: 12px;
            text-align: center; margin-top: 24px;
            line-height: 1.6;
        }
        .success-msg {
            background: #fff0f0; color: #c00; border: 1px solid #fcc;
            padding: 10px 14px; border-radius: 8px;
            margin-bottom: 18px; font-size: 14px;
        }
        @media (max-width: 600px) {
            .login-box {
                padding: 24px;
                width: 90%;
            }
            h1 {
                font-size: 22px;
            }
            .subtitle {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>⚡ Portail Réseau</h1>
        <p class="subtitle">Authentifiez-vous pour accéder au réseau</p>


        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" placeholder="ex: ahmed" required autofocus aria-label="Nom d'utilisateur">
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Mot de passe" required autocomplete="off" aria-label="Mot de passe">
            </div>
            <button type="submit">Se connecter</button>
        </form>

        <p class="info">
            Votre IP : {{ client_ip }}<br>
            Session valide {{ hours }}h après connexion
        </p>

        <p class="success-msg" style="display:none;">Connexion réussie !</p>

        <script>
        // Example logic to show success message
        function showSuccessMessage() {
            const successMsg = document.querySelector('.success-msg');
            successMsg.style.display = 'block';
        }
        </script>
    </div>
</body>
</html>
